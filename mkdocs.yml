site_name: "Vexy Lines Manual"
site_description: "The complete guide to Vexy Lines vector art"
theme:
  custom_dir: overrides
  name: materialx
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
  palette:
    - scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Light mode
    - scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Dark mode
docs_dir: src_docs
site_dir: docs
markdown_extensions:
  - pymdownx.highlight:
      auto_title: true
      auto_title_map:
        Python: ""
        Bash: ""
        JSON: ""
        XML: ""
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
  - tables
nav:
  - Home: index.md
  - Front Matter:
